services:

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-datamorph}
      POSTGRES_USER:     ${POSTGRES_USER:-datamorph}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-datamorph}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-datamorph}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: sh -c "python manage.py migrate && python manage.py collectstatic --noinput && waitress-serve --host=0.0.0.0 --port=8000 backend.wsgi:application"
    environment:
      - DJANGO_SETTINGS_MODULE=backend.settings
      - DATABASE_URL=${DATABASE_URL:-postgres://datamorph:datamorph@db:5432/datamorph}
      - REDIS_URL=redis://redis:6379/0
      - HUGGINGFACE_API_KEY=${HUGGINGFACE_API_KEY}
      - SECRET_KEY=${SECRET_KEY}
      - DEBUG=False
      - ALLOWED_HOSTS=*
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      - USE_SPARK=true
    volumes:
      - media_data:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A backend worker --loglevel=info --concurrency=2
    environment:
      - DJANGO_SETTINGS_MODULE=backend.settings
      - DATABASE_URL=${DATABASE_URL:-postgres://datamorph:datamorph@db:5432/datamorph}
      - REDIS_URL=redis://redis:6379/0
      - HUGGINGFACE_API_KEY=${HUGGINGFACE_API_KEY}
      - SECRET_KEY=${SECRET_KEY}
      - DEBUG=False
      - USE_SPARK=true
      - JAVA_HOME=/usr/lib/jvm/default-java
    volumes:
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - web

volumes:
  postgres_data:
  redis_data:
  media_data: